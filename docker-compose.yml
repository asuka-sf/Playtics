services:
  db:
    image: postgres:16
    restart: always
    environment: 
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      # Persist data even after container is stopped
      - postgres_data:/var/lib/postgresql/data


volumes:
  postgres_data: